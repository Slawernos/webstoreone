# Fejlesztői override – hot reload, forrás mountolva
# Használat: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      target: builder
    command: npm run dev
    volumes:
      - ./backend/src:/app/src
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./frontend
      target: builder
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      NODE_ENV: development
