name: Deploy – Docker push to GHCR

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Docker build & push (GHCR)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Docker Buildx beállítása
        uses: docker/setup-buildx-action@v3

      - name: Bejelentkezés a GitHub Container Registrybe
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image – meta
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/petshop-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Frontend image – meta
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/petshop-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Backend image build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image build & push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy összefoglalás
        run: |
          echo "### Docker képek publikálva :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`ghcr.io/${{ github.repository_owner }}/petshop-backend:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`ghcr.io/${{ github.repository_owner }}/petshop-frontend:latest\` |" >> $GITHUB_STEP_SUMMARY
