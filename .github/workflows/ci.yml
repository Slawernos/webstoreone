name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # BACKEND – Jest unit tesztek
  # ─────────────────────────────────────────
  backend:
    name: Backend (Node.js + Jest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Függőségek telepítése
        run: npm ci

      - name: Unit tesztek futtatása
        run: npm test -- --coverage --ci
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────
  # FRONTEND – TypeScript ellenőrzés + build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (React + TypeScript + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Függőségek telepítése
        run: npm ci

      - name: TypeScript típusellenőrzés
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  # ─────────────────────────────────────────
  # E2E – Cypress tesztek (backend + frontend együtt)
  # ─────────────────────────────────────────
  e2e:
    name: E2E tesztek (Cypress)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend függőségek
        run: npm ci
        working-directory: backend

      - name: Frontend függőségek
        run: npm ci
        working-directory: frontend

      - name: Backend indítása (háttérben)
        run: npm start &
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5000

      - name: Frontend dev szerver indítása (háttérben)
        run: npm run dev &
        working-directory: frontend

      - name: Várakozás a szerverekre
        run: npx wait-on http://localhost:5000/api/health http://localhost:5173 --timeout 30000

      - name: Cypress E2E tesztek
        uses: cypress-io/github-action@v6
        with:
          working-directory: .
          browser: chrome
          headed: false
