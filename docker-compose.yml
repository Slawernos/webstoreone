services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: petshop-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: petshop-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  sqlite_data:

# ── Fejlesztői override: docker-compose.override.yml ──────
# Fejlesztéshez használd: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
